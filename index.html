<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#1f6feb" />
  <title>Daily Exercise Tracker</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div>
      <h1>Daily Exercise Tracker</h1>
      <p>Track wrist exercises on desktop or mobile</p>
    </div>
    <div class="topbar-actions">
      <button id="exportBtn" class="secondary">Export JSON</button>
      <button id="clearBtn" class="danger">Clear Data</button>
    </div>
  </header>

  <main class="container">
    <section class="card hero">
      <div>
        <h2>Today</h2>
        <p id="todayLabel"></p>
      </div>
      <div class="stats">
        <div><span id="doneToday">0</span><small>Done today</small></div>
        <div><span id="monthDone">0</span><small>This month</small></div>
        <div><span id="streak">0</span><small>Day streak</small></div>
      </div>
    </section>

    <section>
      <div class="section-head"><h2>Exercises</h2><span>Tap one to open</span></div>
      <div id="exerciseGrid" class="grid"></div>
    </section>

    <section class="split">
      <div class="card">
        <div class="section-head"><h2>Calendar</h2><span>Monthly completion</span></div>
        <div class="calendar-controls">
          <button id="prevMonth" class="secondary">Prev</button>
          <h3 id="monthTitle"></h3>
          <button id="nextMonth" class="secondary">Next</button>
        </div>
        <div id="calendar" class="calendar"></div>
      </div>

      <div class="card">
        <div class="section-head"><h2>Monthly report</h2><span id="reportTitle"></span></div>
        <div id="reportList" class="report-list"></div>
      </div>
    </section>
  </main>

  <template id="exerciseTemplate">
    <a class="exercise-card" href="#">
      <img alt="Exercise image" />
      <div>
        <h3></h3>
        <p></p>
      </div>
    </a>
  </template>

  <script src="app.js"></script>
</body>
</html>
